<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your order &middot; {{ store_name }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/theme.css') }}" rel="stylesheet">
</head>
<body class="section-tint">
  <div class="container py-5" style="max-width: 480px;">
    <div class="cart-panel p-4 text-center">
      <p class="text-muted small mb-1">Your order</p>
      <div id="items" class="text-start mb-3"></div>
      <p class="text-muted small mb-0">Total due</p>
      <p class="display-total fs-1" id="total">GH&#8373;0.00</p>
      <div id="hint" class="badge status-pill-pending px-3 py-2">Waiting for cashier&hellip;</div>
    </div>
  </div>

  <script>
    function ghs(v) { return 'GH₵' + Number(v).toFixed(2); }

    async function poll() {
      const res = await fetch('{{ url_for("pos.get_cart_public") }}');
      const data = await res.json();
      const itemsEl = document.getElementById('items');
      itemsEl.innerHTML = '';
      data.items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'd-flex justify-content-between border-bottom py-2';
        row.innerHTML = `<span>${item.quantity} &times; ${item.name}</span><span>${ghs(item.line_total)}</span>`;
        itemsEl.appendChild(row);
      });
      document.getElementById('total').textContent = ghs(data.total_amount);

      const hint = document.getElementById('hint');
      if (!data.items.length) {
        hint.textContent = 'Waiting for cashier…';
        hint.className = 'badge status-pill-pending px-3 py-2';
      } else if (data.status === 'completed') {
        hint.textContent = 'Payment received — thank you!';
        hint.className = 'badge status-pill-paid px-3 py-2';
      } else {
        hint.textContent = 'Scan to pay with MTN MoMo, Vodafone Cash or AirtelTigo Money';
        hint.className = 'badge status-pill-pending px-3 py-2';
      }
    }

    poll();
    setInterval(poll, 2000);
  </script>
</body>
</html>
