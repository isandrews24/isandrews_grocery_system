{% extends "base.html" %}
{% block title %}Log in &middot; {{ store_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <h1 class="h4 text-brand-slate mb-4">Log in to your account</h1>

    <form method="post" class="cart-panel p-4">
      <div class="mb-3">
        <label class="form-label small">Phone or email</label>
        <input type="text" name="identifier" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label small">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-brand w-100">Log in</button>
      <p class="text-center small text-muted mt-3 mb-0">
        Don't have an account? <a href="{{ url_for('account.register') }}">Create one</a>
      </p>
    </form>
  </div>
</div>
{% endblock %}
