<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Label &middot; {{ product.name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: "Segoe UI", sans-serif; padding: 24px; }
    .label {
      width: 260px;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 14px;
      text-align: center;
    }
    .label img { width: 140px; height: 140px; }
    .label .price { font-size: 22px; font-weight: 700; }
    .label .barcode-text { font-family: "Consolas", monospace; letter-spacing: 2px; }
    @media print {
      .no-print { display: none; }
      .label { border: none; }
    }
  </style>
</head>
<body>
  <div class="no-print mb-3 d-flex gap-2">
    <button class="btn btn-primary btn-sm" onclick="window.print()">Print label</button>
    <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('inventory.products') }}">Back to products</a>
  </div>

  <div class="label">
    <p class="fw-semibold mb-1">{{ product.name }}</p>
    <p class="text-muted small mb-2">{{ product.sku }}</p>
    <img src="{{ url_for('inventory.product_qr', product_id=product.id) }}" alt="QR code linking to {{ product.name }}">
    <p class="price my-2">{{ product.unit_price | ghs }}</p>
    {% if product.barcode_number %}
      <p class="barcode-text mb-0">{{ product.barcode_number }}</p>
    {% else %}
      <p class="text-muted small mb-0">No barcode on file &mdash; scan the QR code instead.</p>
    {% endif %}
  </div>
</body>
</html>
