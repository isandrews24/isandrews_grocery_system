{% extends "base.html" %}
{% block title %}Count stock take &middot; {{ store_name }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h4 text-brand-slate mb-0">Count sheet &middot; {{ take.scheduled_date }}</h1>
  <a href="{{ url_for('inventory.stock_takes') }}" class="btn btn-outline-brand btn-sm">Back</a>
</div>

<form method="post" class="cart-panel p-4">
  <table class="table">
    <thead>
      <tr><th>Product</th><th>Expected</th><th>Physical count</th></tr>
    </thead>
    <tbody>
      {% for item in take.items %}
        <tr>
          <td>{{ item.product.name }}</td>
          <td>{{ item.expected_quantity }}</td>
          <td style="max-width: 140px;">
            <input type="number" step="0.001" name="count_{{ item.id }}" class="form-control form-control-sm"
                   value="{{ item.physical_quantity if item.physical_quantity is not none else '' }}">
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
  <button type="submit" class="btn btn-brand w-100">Save counts and send for review</button>
</form>
{% endblock %}
