{% macro stars(rating) %}
  {% for i in range(1, 6) %}
    {% if rating and i <= rating %}
      <i class="bi bi-star-fill"></i>
    {% elif rating and i - rating < 1 %}
      <i class="bi bi-star-half"></i>
    {% else %}
      <i class="bi bi-star"></i>
    {% endif %}
  {% endfor %}
{% endmacro %}
